services:
  db:
    image: postgres:18-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roomly"]
      interval: 5s
      retries: 5
      start_period: 10s
    
  migrate:
    image: migrate/migrate
    env_file:
      - .env
    volumes:
    - ./migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "$DATABASE_URL",
      "up"
    ]
    depends_on:
      db:
        condition: service_healthy

  roomly:
    build: .
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata: